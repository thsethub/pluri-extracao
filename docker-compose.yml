version: "3.8"

services:
  # ── API de Classificação (FastAPI - porta 8000) ─────────────
  api:
    image: ghcr.io/thsethub/pluri-extracao/api:latest
    container_name: pluri-api
    restart: unless-stopped
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-3.5-turbo}
      - OPENAI_MAX_TOKENS=${OPENAI_MAX_TOKENS:-500}
      - OPENAI_TEMPERATURE=${OPENAI_TEMPERATURE:-0}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MAX_RETRIES=${MAX_RETRIES:-3}
      - RETRY_DELAY=${RETRY_DELAY:-1}
      - DISCIPLINES=${DISCIPLINES:-Artes,Biologia,Ciências,Educação Física,Espanhol,Filosofia,Física,Geografia,História,Língua Inglesa,Língua Portuguesa,Matemática,Natureza e Sociedade,Química,Sociologia}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-trieduc}
      - PG_HOST=${PG_HOST}
      - PG_PORT=${PG_PORT:-3306}
      - PG_USER=${PG_USER}
      - PG_PASSWORD=${PG_PASSWORD}
      - PG_NAME=${PG_NAME}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_EXPIRE_MINUTES=${JWT_EXPIRE_MINUTES:-480}
      - IA_CLASSIFICATION_MODEL=${IA_CLASSIFICATION_MODEL:-gpt-5.2}
      - IA_PROMPT_VERSION=${IA_PROMPT_VERSION:-v1}
      - IA_MAX_QUESTION_CHARS=${IA_MAX_QUESTION_CHARS:-4000}
      - IA_MAX_OUTPUT_MODULES=${IA_MAX_OUTPUT_MODULES:-1}
      - IA_USE_HUMAN_PRIORS=${IA_USE_HUMAN_PRIORS:-true}
      - IA_HUMAN_PRIOR_TOP_K=${IA_HUMAN_PRIOR_TOP_K:-3}
      - IA_HUMAN_PRIOR_MIN_SAMPLES=${IA_HUMAN_PRIOR_MIN_SAMPLES:-5}
      - IA_ENABLE_FALLBACK_FIRST_MODULE=${IA_ENABLE_FALLBACK_FIRST_MODULE:-false}
      - IA_COST_PER_1K_INPUT_TOKENS=${IA_COST_PER_1K_INPUT_TOKENS:-0.00175}
      - IA_COST_PER_1K_OUTPUT_TOKENS=${IA_COST_PER_1K_OUTPUT_TOKENS:-0.014}
    ports:
      - "${API_PORT:-8989}:8000"
    volumes:
      - api-logs:/app/logs
      - api-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "com.centurylinklabs.watchtower.scope=pluri"

  # ── Webscraping Agent (Painel Web - porta 8501) ─────────────
  # webscraping:
  #   image: ghcr.io/thsethub/pluri-extracao/webscraping:latest
  #   container_name: pluri-webscraping
  #   restart: unless-stopped
  #   shm_size: "2gb"
  #   environment:
  #     - API_BASE_URL=http://api:8000
  #     - HEADLESS=true
  #     - LOG_LEVEL=${LOG_LEVEL:-INFO}
  #     - SUPERPRO_EMAIL=${SUPERPRO_EMAIL}
  #     - SUPERPRO_PASSWORD=${SUPERPRO_PASSWORD}
  #   ports:
  #     - "${WS_PORT:-8501}:8501"
  #   volumes:
  #     - ws-logs:/app/logs
  #     - ws-storage:/app/storage
  #   depends_on:
  #     api:
  #       condition: service_healthy
  #   labels:
  #     - "com.centurylinklabs.watchtower.scope=pluri"

  # ── Classificacao Frontend (Porta 9595) ──────────────────────
  frontend:
    image: ghcr.io/thsethub/pluri-extracao/frontend:latest
    container_name: pluri-frontend
    restart: unless-stopped
    environment:
      - API_URL=http://api:8000
    ports:
      - "9595:3000"
    depends_on:
      api:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.scope=pluri"

  # ── Watchtower (auto-update das imagens) ────────────────────
  # Desabilitado: incompatibilidade entre SDK interno do Watchtower (API 1.25)
  # e Docker Engine v29 (API mínima 1.44).
  # Para atualizar manualmente: docker compose pull && docker compose up -d
  # watchtower:
  #   image: containrrr/watchtower:latest
  #   container_name: pluri-watchtower
  #   restart: unless-stopped
  #   environment:
  #     - WATCHTOWER_CLEANUP=true
  #     - WATCHTOWER_POLL_INTERVAL=300
  #     - WATCHTOWER_LABEL_ENABLE=false
  #     - WATCHTOWER_SCOPE=pluri
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   command: --scope pluri --interval 300
  #   labels:
  #     - "com.centurylinklabs.watchtower.scope=pluri"

volumes:
  api-logs:
  api-data:
  ws-logs:
  ws-storage:
